{% extends "base.html" %}
{% block title %}Admin login &mdash; SecureVote{% endblock %}
{% block content %}
<h1>Election officer login</h1>
<div class="card" style="max-width:380px; margin:0 auto;">
  <form method="POST" action="/admin/login">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <div style="margin-top:22px;">
      <button type="submit" class="stamp" style="width:100%;">Log in</button>
    </div>
  </form>
  {% if error %}<div class="status-line err">{{ error }}</div>{% endif %}
</div>
{% endblock %}
